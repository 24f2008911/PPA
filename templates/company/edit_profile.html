{% extends 'base.html' %}
{% block title %}Edit Company Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3><i class="bi bi-pencil-square"></i> Edit Profile</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company_name" class="form-control" value="{{ company.company_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">HR Contact</label>
                            <input type="text" name="hr_contact" class="form-control" value="{{ company.hr_contact or '' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" value="{{ company.phone or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Website</label>
                            <input type="url" name="website" class="form-control" value="{{ company.website or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Industry</label>
                        <input type="text" name="industry" class="form-control" value="{{ company.industry or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ company.description or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Save Changes</button>
                    <a href="{{ url_for('company_profile') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
