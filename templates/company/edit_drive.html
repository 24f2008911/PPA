{% extends 'base.html' %}
{% block title %}Edit Drive{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h3><i class="bi bi-pencil-square"></i> Edit Placement Drive</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Job Title *</label>
                            <input type="text" name="job_title" class="form-control" value="{{ drive.job_title }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" value="{{ drive.location or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea name="job_description" class="form-control" rows="3">{{ drive.job_description or '' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salary Range</label>
                            <input type="text" name="salary_range" class="form-control" value="{{ drive.salary_range or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Experience Required</label>
                            <input type="text" name="experience" class="form-control" value="{{ drive.experience or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Eligibility Criteria</label>
                        <textarea name="eligibility" class="form-control" rows="2">{{ drive.eligibility or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Required Skills</label>
                        <input type="text" name="required_skills" class="form-control" value="{{ drive.required_skills or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" name="deadline" class="form-control" value="{{ drive.deadline.strftime('%Y-%m-%d') if drive.deadline else '' }}">
                    </div>
                    <button type="submit" class="btn btn-warning">Update Drive</button>
                    <a href="{{ url_for('company_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
